<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saboteur</title>
<style>
  :root {
    --gold: #F5A623;
    --gold-dark: #C47D0E;
    --green: #2ECC71;
    --green-dark: #1A8A4A;
    --red: #E74C3C;
    --red-dark: #A93226;
    --blue: #3498DB;
    --blue-dark: #1A6FA8;
    --purple: #9B59B6;
    --dark: #1A1A2E;
    --darker: #12121F;
    --card-bg: #2C2C4A;
    --card-border: #4A4A7A;
    --tunnel: #8B6914;
    --tunnel-light: #D4A017;
    --rock: #4A4A5A;
    --rock-light: #6A6A8A;
    --text: #F0E6FF;
    --text-muted: #9090B0;
    --panel: #22223A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── TITLE SCREEN ── */
  #title-screen {
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #2a1a5e 0%, #12121F 70%);
    text-align: center;
    padding: 2rem;
  }
  .title-gem {
    font-size: 5rem;
    margin-bottom: 0.5rem;
    filter: drop-shadow(0 0 20px #F5A623);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  h1.game-title {
    font-size: 3.5rem;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #F5A623, #FFD700, #F5A623);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .subtitle { color: var(--text-muted); font-size: 1rem; letter-spacing: 3px; margin-bottom: 2rem; }
  .player-setup { background: var(--panel); border-radius: 16px; padding: 2rem; max-width: 420px; width: 100%; }
  .player-setup h3 { margin-bottom: 1rem; color: var(--gold); }
  .player-count-btns { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .pc-btn {
    width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--card-border);
    background: var(--card-bg); color: var(--text); font-size: 1.1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .pc-btn:hover, .pc-btn.active { background: var(--gold); border-color: var(--gold); color: #000; transform: scale(1.1); }
  .start-btn {
    width: 100%; padding: 1rem; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #000; font-size: 1.2rem; font-weight: 800; cursor: pointer;
    letter-spacing: 2px; transition: all 0.2s; text-transform: uppercase;
  }
  .start-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

  /* ── ROLE REVEAL ── */
  #role-screen {
    align-items: center; justify-content: center;
    background: var(--darker); padding: 2rem; text-align: center;
  }
  .role-card {
    background: var(--panel); border-radius: 20px; padding: 2.5rem;
    max-width: 380px; width: 100%; border: 2px solid var(--card-border);
  }
  .role-icon { font-size: 5rem; margin-bottom: 1rem; }
  .role-name { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
  .role-name.miner { color: var(--green); }
  .role-name.saboteur { color: var(--red); }
  .role-desc { color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.6; }
  .role-pass-btn {
    background: var(--card-bg); border: 1px solid var(--card-border);
    color: var(--text); padding: 0.8rem 2rem; border-radius: 10px;
    cursor: pointer; font-size: 1rem; transition: all 0.2s;
  }
  .role-pass-btn:hover { background: var(--card-border); }

  /* ── GAME SCREEN ── */
  #game-screen { flex-direction: row; height: 100vh; overflow: hidden; }

  /* Left panel */
  .left-panel {
    width: 220px; min-width: 220px; background: var(--panel);
    border-right: 1px solid var(--card-border);
    display: flex; flex-direction: column; padding: 1rem; gap: 0.75rem;
    overflow-y: auto;
  }
  .panel-title { color: var(--gold); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
  .player-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .player-item {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem; border-radius: 8px; background: var(--card-bg);
    border: 1px solid transparent; font-size: 0.85rem; transition: all 0.2s;
  }
  .player-item.current { border-color: var(--gold); background: rgba(245,166,35,0.15); }
  .player-item.broken { opacity: 0.5; }
  .p-avatar {
    width: 28px; height: 28px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700;
  }
  .p-name { flex: 1; }
  .p-tools { display: flex; gap: 2px; }
  .tool-icon { font-size: 0.7rem; }
  .broken-icon { color: var(--red); font-size: 0.75rem; }
  .divider { border: none; border-top: 1px solid var(--card-border); }
  .round-info { text-align: center; }
  .round-info .big { font-size: 1.5rem; font-weight: 800; color: var(--gold); }
  .round-info .label { font-size: 0.75rem; color: var(--text-muted); }
  .deck-info { display: flex; gap: 0.5rem; }
  .deck-pill {
    flex: 1; padding: 0.4rem; background: var(--card-bg);
    border-radius: 8px; text-align: center; border: 1px solid var(--card-border);
  }
  .deck-pill .dnum { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
  .deck-pill .dlabel { font-size: 0.65rem; color: var(--text-muted); }
  .log-area {
    flex: 1; background: var(--card-bg); border-radius: 8px;
    border: 1px solid var(--card-border); padding: 0.5rem;
    overflow-y: auto; font-size: 0.72rem; line-height: 1.6;
  }
  .log-entry { color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 2px 0; }
  .log-entry.good { color: var(--green); }
  .log-entry.bad { color: var(--red); }
  .log-entry.info { color: var(--gold); }

  /* Center board */
  .board-area {
    flex: 1; overflow: auto; display: flex;
    align-items: flex-start; justify-content: center;
    padding: 1rem; background: #0D0D1A;
  }
  .mine-grid {
    display: grid;
    grid-template-columns: repeat(9, 68px);
    grid-template-rows: repeat(5, 68px);
    gap: 4px;
  }
  .cell {
    width: 68px; height: 68px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; position: relative;
    font-size: 0.65rem; color: var(--text-muted); background: rgba(255,255,255,0.03);
  }
  .cell:hover { border-color: var(--gold); background: rgba(245,166,35,0.08); }
  .cell.has-card { cursor: default; }
  .cell.has-card:hover { border-color: rgba(255,255,255,0.08); background: none; }
  .cell.placeable { border-color: var(--green); background: rgba(46,204,113,0.1); cursor: pointer; }
  .cell.placeable:hover { background: rgba(46,204,113,0.2); }
  .cell.start-card, .cell.goal-card { cursor: default; }

  /* Tunnel cards drawn on canvas */
  .tunnel-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

  /* Right panel */
  .right-panel {
    width: 260px; min-width: 260px; background: var(--panel);
    border-left: 1px solid var(--card-border);
    display: flex; flex-direction: column; padding: 1rem; gap: 0.75rem;
    overflow-y: auto;
  }
  .turn-badge {
    background: rgba(245,166,35,0.15); border: 1px solid var(--gold);
    border-radius: 10px; padding: 0.5rem; text-align: center;
  }
  .turn-badge .pname { font-weight: 700; color: var(--gold); }
  .turn-badge .hint { font-size: 0.75rem; color: var(--text-muted); }
  .hand-area { display: flex; flex-direction: column; gap: 0.4rem; }
  .hand-card {
    background: var(--card-bg); border: 1.5px solid var(--card-border);
    border-radius: 10px; padding: 0.6rem 0.75rem;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.6rem;
    min-height: 52px;
  }
  .hand-card:hover { border-color: var(--gold); transform: translateX(-3px); }
  .hand-card.selected { border-color: var(--gold); background: rgba(245,166,35,0.2); transform: translateX(-5px); }
  .hand-card.action-card { border-color: var(--blue); }
  .hand-card.action-card:hover { border-color: #5DADE2; }
  .hand-card.action-card.selected { background: rgba(52,152,219,0.2); }
  .hcard-icon { font-size: 1.5rem; flex-shrink: 0; }
  .hcard-info { flex: 1; }
  .hcard-name { font-size: 0.8rem; font-weight: 600; }
  .hcard-desc { font-size: 0.68rem; color: var(--text-muted); line-height: 1.3; }
  .action-btns { display: flex; flex-direction: column; gap: 0.5rem; }
  .act-btn {
    padding: 0.65rem; border-radius: 8px; border: none;
    font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .act-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .act-btn.discard { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-muted); }
  .act-btn.place { background: var(--green); color: #000; }
  .act-btn.place:disabled { background: var(--card-bg); color: var(--text-muted); cursor: not-allowed; transform: none; }
  .act-btn.use-action { background: var(--blue); color: #fff; }
  .act-btn.use-action:disabled { background: var(--card-bg); color: var(--text-muted); cursor: not-allowed; transform: none; }
  .flip-btn {
    background: var(--purple); color: #fff; padding: 0.5rem;
    border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600;
  }
  .target-hint { font-size: 0.72rem; color: var(--text-muted); text-align: center; background: var(--card-bg); border-radius: 6px; padding: 0.4rem; }

  /* Goal reveal indicator */
  .goals-info { display: flex; gap: 0.5rem; }
  .goal-pill {
    flex: 1; padding: 0.4rem; border-radius: 8px; text-align: center;
    border: 1px solid var(--card-border); font-size: 0.7rem;
    background: var(--card-bg);
  }
  .goal-pill.revealed { border-color: var(--gold); background: rgba(245,166,35,0.1); color: var(--gold); }
  .goal-pill.found { border-color: var(--green); background: rgba(46,204,113,0.15); color: var(--green); }

  /* ── END SCREEN ── */
  #end-screen {
    align-items: center; justify-content: center; padding: 2rem;
    background: var(--darker); text-align: center;
  }
  .end-card {
    background: var(--panel); border-radius: 20px; padding: 2.5rem;
    max-width: 480px; width: 100%; border: 2px solid var(--card-border);
  }
  .end-icon { font-size: 5rem; margin-bottom: 0.5rem; }
  .end-title { font-size: 2rem; font-weight: 900; margin-bottom: 1rem; }
  .score-list { list-style: none; text-align: left; margin-bottom: 1.5rem; }
  .score-list li { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--card-border); font-size: 0.9rem; }
  .score-val { font-weight: 700; color: var(--gold); }
  .play-again-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none; color: #000; padding: 0.9rem 2.5rem;
    border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer;
    letter-spacing: 1px; transition: all 0.2s;
  }
  .play-again-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

  /* Player target overlay */
  .target-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .target-overlay.visible { display: flex; }
  .target-box {
    background: var(--panel); border-radius: 16px; padding: 1.5rem;
    max-width: 360px; width: 90%; border: 1px solid var(--card-border);
  }
  .target-box h3 { color: var(--gold); margin-bottom: 1rem; }
  .target-players { display: flex; flex-direction: column; gap: 0.5rem; }
  .target-player-btn {
    background: var(--card-bg); border: 1px solid var(--card-border);
    color: var(--text); padding: 0.6rem 1rem; border-radius: 8px;
    cursor: pointer; font-size: 0.9rem; transition: all 0.2s; text-align: left;
  }
  .target-player-btn:hover { border-color: var(--blue); background: rgba(52,152,219,0.15); }
  .cancel-target {
    margin-top: 0.75rem; width: 100%; padding: 0.5rem;
    background: none; border: 1px solid var(--card-border);
    color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--panel); border: 1px solid var(--card-border);
    color: var(--text); padding: 0.75rem 1.5rem; border-radius: 12px;
    font-size: 0.9rem; z-index: 200; transition: transform 0.3s; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* Responsive tweaks */
  @media (max-width: 900px) {
    #game-screen { flex-direction: column; height: auto; overflow: auto; }
    .left-panel, .right-panel { width: 100%; min-width: unset; }
    .board-area { overflow-x: auto; }
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="title-gem">💎</div>
  <h1 class="game-title">Saboteur</h1>
  <p class="subtitle">THE MINE CARD GAME</p>
  <div class="player-setup">
    <h3>How many players?</h3>
    <div class="player-count-btns" id="pc-btns">
      <button class="pc-btn" onclick="setPC(3)">3</button>
      <button class="pc-btn" onclick="setPC(4)">4</button>
      <button class="pc-btn active" onclick="setPC(5)">5</button>
      <button class="pc-btn" onclick="setPC(6)">6</button>
      <button class="pc-btn" onclick="setPC(7)">7</button>
    </div>
    <button class="start-btn" onclick="startGame()">⛏ Dig for Gold!</button>
  </div>
</div>

<!-- ROLE REVEAL SCREEN -->
<div id="role-screen" class="screen">
  <div class="role-card" id="role-card">
    <div class="role-icon" id="role-icon">⛏</div>
    <div class="role-name" id="role-name">Miner</div>
    <p class="role-desc" id="role-desc"></p>
    <button class="role-pass-btn" id="role-btn" onclick="nextRoleReveal()">Pass to next player →</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <!-- Left -->
  <div class="left-panel">
    <div class="panel-title">Players</div>
    <div class="player-list" id="player-list"></div>
    <hr class="divider">
    <div class="round-info">
      <div class="big" id="round-num">1</div>
      <div class="label">ROUND</div>
    </div>
    <hr class="divider">
    <div class="panel-title">Deck</div>
    <div class="deck-info">
      <div class="deck-pill"><div class="dnum" id="deck-count">0</div><div class="dlabel">Cards</div></div>
      <div class="deck-pill"><div class="dnum" id="discard-count">0</div><div class="dlabel">Discarded</div></div>
    </div>
    <hr class="divider">
    <div class="panel-title">Goals</div>
    <div class="goals-info" id="goals-info"></div>
    <hr class="divider">
    <div class="panel-title">Log</div>
    <div class="log-area" id="log-area"></div>
  </div>

  <!-- Board -->
  <div class="board-area">
    <div class="mine-grid" id="mine-grid"></div>
  </div>

  <!-- Right -->
  <div class="right-panel">
    <div class="turn-badge">
      <div class="pname" id="cur-player-name">Player 1</div>
      <div class="hint">Your turn</div>
    </div>
    <div class="panel-title">Your Hand</div>
    <div class="hand-area" id="hand-area"></div>
    <hr class="divider">
    <div id="selected-info" class="target-hint" style="display:none"></div>
    <div class="action-btns">
      <button class="act-btn flip-btn" id="flip-btn" onclick="flipSelected()" style="display:none">🔄 Rotate Card</button>
      <button class="act-btn place" id="place-btn" onclick="placeCard()" disabled>Place Tunnel</button>
      <button class="act-btn use-action" id="action-btn" onclick="useActionCard()" disabled>Use Action Card</button>
      <button class="act-btn discard" onclick="discardSelected()">Discard Selected</button>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<div id="end-screen" class="screen">
  <div class="end-card" id="end-card">
    <div class="end-icon" id="end-icon">💎</div>
    <div class="end-title" id="end-title">Miners Win!</div>
    <ul class="score-list" id="score-list"></ul>
    <button class="play-again-btn" onclick="location.reload()">Play Again</button>
  </div>
</div>

<!-- Target player overlay -->
<div class="target-overlay" id="target-overlay">
  <div class="target-box">
    <h3 id="target-title">Choose target player</h3>
    <div class="target-players" id="target-players"></div>
    <button class="cancel-target" onclick="closeTargetOverlay()">Cancel</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  SABOTEUR — Full Game Engine
// ══════════════════════════════════════════════

// ── GRID CONFIG ──
const COLS = 9, ROWS = 5;
const START_COL = 0, START_ROW = 2;
const GOAL_COL = 8;
const GOAL_ROWS = [0, 2, 4];

// ── TUNNEL CARD TYPES ──
// Each card: { id, type, paths, name, icon }
// paths: which sides are open: T=top R=right B=bottom L=left
// 'cross','straight-h','straight-v','turn','t-junction', etc.

const TUNNEL_TYPES = [
  { id:'cross',   name:'Crossroads',    icon:'⊕', paths:{T:1,R:1,B:1,L:1}, count:5 },
  { id:'str-h',   name:'Tunnel H',      icon:'━', paths:{T:0,R:1,B:0,L:1}, count:5 },
  { id:'str-v',   name:'Tunnel V',      icon:'┃', paths:{T:1,R:0,B:1,L:0}, count:4 },
  { id:'turn-tr', name:'Turn TR',       icon:'╰', paths:{T:1,R:1,B:0,L:0}, count:5 },
  { id:'turn-br', name:'Turn BR',       icon:'╭', paths:{T:0,R:1,B:1,L:0}, count:5 },
  { id:'turn-bl', name:'Turn BL',       icon:'╮', paths:{T:0,R:0,B:1,L:1}, count:5 },
  { id:'turn-tl', name:'Turn TL',       icon:'╯', paths:{T:1,R:0,B:0,L:1}, count:5 },
  { id:'t-trb',   name:'T-Junction',    icon:'┣', paths:{T:1,R:1,B:1,L:0}, count:5 },
  { id:'t-rbl',   name:'T-Junction',    icon:'┻', paths:{T:0,R:1,B:1,L:1}, count:5 },
  { id:'t-tbl',   name:'T-Junction',    icon:'┫', paths:{T:1,R:0,B:1,L:1}, count:5 },
  { id:'t-trl',   name:'T-Junction',    icon:'┳', paths:{T:1,R:1,B:0,L:1}, count:5 },
  { id:'dead-r',  name:'Dead End →',    icon:'▶', paths:{T:0,R:1,B:0,L:0}, count:3 },
  { id:'dead-l',  name:'Dead End ←',    icon:'◀', paths:{T:0,R:0,B:0,L:1}, count:3 },
  { id:'dead-t',  name:'Dead End ↑',    icon:'▲', paths:{T:1,R:0,B:0,L:0}, count:3 },
  { id:'dead-b',  name:'Dead End ↓',    icon:'▼', paths:{T:0,R:0,B:1,L:0}, count:3 },
];

// Action cards
const ACTION_TYPES = [
  { id:'map',      name:'Map',           icon:'🗺️',  desc:'Peek at a goal card',    count:6  },
  { id:'collapse', name:'Cave-in',       icon:'💥',  desc:'Remove a tunnel card',   count:3  },
  { id:'fix-pick', name:'Fix Pickaxe',   icon:'⛏️',  desc:'Fix a broken pickaxe',   count:2  },
  { id:'fix-lamp', name:'Fix Lamp',      icon:'🔦',  desc:'Fix a broken lamp',      count:2  },
  { id:'fix-cart', name:'Fix Cart',      icon:'🛒',  desc:'Fix a broken cart',      count:2  },
  { id:'brk-pick', name:'Break Pickaxe', icon:'🚫⛏', desc:'Break someone\'s pickaxe', count:3 },
  { id:'brk-lamp', name:'Break Lamp',    icon:'🚫🔦', desc:'Break someone\'s lamp',    count:3 },
  { id:'brk-cart', name:'Break Cart',    icon:'🚫🛒', desc:'Break someone\'s cart',    count:3 },
];

// ── GAME STATE ──
let G = {};

function setPC(n) {
  G.numPlayers = n;
  document.querySelectorAll('.pc-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ── INIT ──
G.numPlayers = 5;
let revealIdx = 0;

function startGame() {
  G.round = 1;
  G.currentPlayer = 0;
  G.discardPile = [];
  G.placedCards = {}; // key: "col,row" → card
  G.playerBroken = []; // broken tools per player
  G.scores = {};
  G.goldFound = false;
  G.pendingActionCard = null;
  G.selectedCard = null;
  G.selectedCellKey = null;
  G.flipped = false;
  G.goalCards = buildGoalCards();
  G.goalRevealed = [false, false, false];

  // Build players
  G.players = [];
  for (let i = 0; i < G.numPlayers; i++) {
    G.players.push({ name:`Player ${i+1}`, hand:[], broken:[], score:0 });
  }

  // Assign roles
  G.roles = assignRoles(G.numPlayers);

  // Build & shuffle deck
  G.deck = buildDeck();
  shuffle(G.deck);

  // Deal 4-6 cards each
  const handSize = G.numPlayers <= 5 ? 6 : (G.numPlayers <= 7 ? 5 : 4);
  for (let i = 0; i < G.numPlayers; i++) {
    for (let j = 0; j < handSize; j++) G.players[i].hand.push(G.deck.pop());
  }

  // Place start card
  G.placedCards[`${START_COL},${START_ROW}`] = { type:'start', paths:{T:1,R:1,B:1,L:1}, flipped:false };

  // Role reveal
  revealIdx = 0;
  showScreen('role-screen');
  showRoleCard(0);
}

function assignRoles(n) {
  // saboteur counts from official rules
  const sabCounts = { 3:1, 4:1, 5:2, 6:2, 7:3, 8:3, 9:3, 10:4 };
  const sabs = sabCounts[n] || 1;
  let roles = [];
  for (let i = 0; i < sabs; i++) roles.push('saboteur');
  for (let i = sabs; i < n; i++) roles.push('miner');
  shuffle(roles);
  return roles;
}

function buildGoalCards() {
  // 3 goal positions — one has gold
  let goldIdx = Math.floor(Math.random() * 3);
  return GOAL_ROWS.map((_, i) => ({
    isGold: i === goldIdx,
    revealed: false
  }));
}

function buildDeck() {
  let deck = [];
  TUNNEL_TYPES.forEach(t => {
    for (let i = 0; i < t.count; i++) deck.push({ ...t, cardType:'tunnel', flipped:false });
  });
  ACTION_TYPES.forEach(a => {
    for (let i = 0; i < a.count; i++) deck.push({ ...a, cardType:'action' });
  });
  return deck;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ── ROLE REVEAL ──
function showRoleCard(idx) {
  const role = G.roles[idx];
  const isSab = role === 'saboteur';
  document.getElementById('role-icon').textContent = isSab ? '🦹' : '⛏️';
  const rn = document.getElementById('role-name');
  rn.textContent = isSab ? 'Saboteur!' : 'Gold Miner';
  rn.className = 'role-name ' + (isSab ? 'saboteur' : 'miner');
  document.getElementById('role-desc').textContent = isSab
    ? 'Your goal is to PREVENT the miners from reaching the gold. Block paths, break tools, and cause chaos!'
    : 'Your goal is to dig a connected path from the Start card all the way to the gold. Work together!';
  const btn = document.getElementById('role-btn');
  btn.textContent = idx < G.numPlayers - 1 ? `Pass to Player ${idx+2} →` : '🎮 Start Digging!';
}

function nextRoleReveal() {
  revealIdx++;
  if (revealIdx >= G.numPlayers) {
    showScreen('game-screen');
    buildBoardUI();
    renderAll();
  } else {
    showRoleCard(revealIdx);
  }
}

// ── BOARD BUILD ──
function buildBoardUI() {
  const grid = document.getElementById('mine-grid');
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.col = c;
      cell.dataset.row = r;
      cell.id = `cell-${c}-${r}`;
      cell.onclick = () => cellClick(c, r);
      grid.appendChild(cell);
    }

// ── RENDER ──
function renderAll() {
  renderBoard();
  renderHand();
  renderPlayers();
  renderSidebar();
}

function renderBoard() {
  // Clear all cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.getElementById(`cell-${c}-${r}`);
      cell.innerHTML = '';
      cell.className = 'cell';
      cell.style.background = '';
      cell.style.border = '';
    }
  }

  // Place start
  drawCard(START_COL, START_ROW, G.placedCards[`${START_COL},${START_ROW}`], true);

  // Place goals
  GOAL_ROWS.forEach((gr, gi) => {
    drawGoal(GOAL_COL, gr, gi);
  });

  // Place tunnel cards
  Object.entries(G.placedCards).forEach(([key, card]) => {
    const [c, r] = key.split(',').map(Number);
    if (c === START_COL && r === START_ROW) return;
    drawCard(c, r, card, false);
  });

  // Highlight placeable cells
  if (G.selectedCard && G.selectedCard.cardType === 'tunnel' && !isPlayerBroken()) {
    getPlaceableCells().forEach(([c, r]) => {
      const cell = document.getElementById(`cell-${c}-${r}`);
      if (cell) cell.classList.add('placeable');
    });
  }

  // Highlight selected cell
  if (G.selectedCellKey) {
    const [c, r] = G.selectedCellKey.split(',').map(Number);
    const cell = document.getElementById(`cell-${c}-${r}`);
    if (cell) { cell.style.outline = '2px solid #F5A623'; cell.style.outlineOffset = '2px'; }
  }
}

function drawCard(col, row, card, isStart) {
  const cell = document.getElementById(`cell-${col}-${row}`);
  if (!cell) return;
  cell.classList.add('has-card');

  const canvas = document.createElement('canvas');
  canvas.width = 68; canvas.height = 68;
  canvas.className = 'tunnel-canvas';
  canvas.style.position = 'absolute';
  canvas.style.top = '0'; canvas.style.left = '0';
  cell.style.position = 'relative';
  cell.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const W = 68, H = 68, cx = W/2, cy = H/2;

  // Background
  ctx.fillStyle = isStart ? '#1A5C2A' : '#4A3500';
  ctx.beginPath(); ctx.roundRect(0,0,W,H,6); ctx.fill();

  // Rock border
  ctx.strokeStyle = isStart ? '#2ECC71' : '#D4A017';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(1,1,W-2,H-2,5); ctx.stroke();

  const paths = card.flipped ? flipPaths(card.paths) : card.paths;
  const tw = 14; // tunnel width

  ctx.fillStyle = '#8B6000';
  // Draw tunnel corridors
  if (paths.L) { ctx.fillRect(0, cy-tw/2, cx, tw); }
  if (paths.R) { ctx.fillRect(cx, cy-tw/2, cx, tw); }
  if (paths.T) { ctx.fillRect(cx-tw/2, 0, tw, cy); }
  if (paths.B) { ctx.fillRect(cx-tw/2, cy, tw, cy); }

  // Center hub if connected
  const anyPath = paths.L || paths.R || paths.T || paths.B;
  if (anyPath) {
    ctx.fillRect(cx-tw/2, cy-tw/2, tw, tw);
  }

  // Tunnel inner highlight
  ctx.fillStyle = '#D4A017';
  const iw = 8;
  if (paths.L) { ctx.fillRect(0, cy-iw/2, cx, iw); }
  if (paths.R) { ctx.fillRect(cx, cy-iw/2, cx, iw); }
  if (paths.T) { ctx.fillRect(cx-iw/2, 0, iw, cy); }
  if (paths.B) { ctx.fillRect(cx-iw/2, cy, iw, cy); }
  if (anyPath) ctx.fillRect(cx-iw/2, cy-iw/2, iw, iw);

  // Label
  if (isStart) {
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('START', cx, H-8);
  }
}

function drawGoal(col, row, goalIdx) {
  const cell = document.getElementById(`cell-${col}-${row}`);
  if (!cell) return;
  cell.classList.add('goal-card', 'has-card');

  const canvas = document.createElement('canvas');
  canvas.width = 68; canvas.height = 68;
  canvas.className = 'tunnel-canvas';
  canvas.style.position = 'absolute';
  canvas.style.top = '0'; canvas.style.left = '0';
  cell.style.position = 'relative';
  cell.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const W = 68, H = 68;
  const goal = G.goalCards[goalIdx];

  if (goal.revealed || G.goldFound) {
    // Show what it is
    ctx.fillStyle = goal.isGold ? '#5C3800' : '#1A1A3A';
    ctx.beginPath(); ctx.roundRect(0,0,W,H,6); ctx.fill();
    ctx.strokeStyle = goal.isGold ? '#F5A623' : '#4A4A7A';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(1,1,W-2,H-2,5); ctx.stroke();

    // If it's a placed card (gold found), draw tunnel
    if (G.placedCards[`${col},${row}`]) {
      drawCard(col, row, G.placedCards[`${col},${row}`], false);
      return;
    }

    ctx.font = '28px serif';
    ctx.textAlign = 'center';
    ctx.fillText(goal.isGold ? '💎' : '🪨', W/2, H/2 + 10);
    ctx.fillStyle = goal.isGold ? '#F5A623' : '#6A6A9A';
    ctx.font = 'bold 8px sans-serif';
    ctx.fillText(goal.isGold ? 'GOLD!' : 'ROCK', W/2, H-8);
  } else {
    // Hidden
    ctx.fillStyle = '#1A1A3A';
    ctx.beginPath(); ctx.roundRect(0,0,W,H,6); ctx.fill();
    ctx.strokeStyle = '#4A4A7A';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(1,1,W-2,H-2,5); ctx.stroke();
    ctx.font = '24px serif';
    ctx.textAlign = 'center';
    ctx.fillText('❓', W/2, H/2+8);
    ctx.fillStyle = '#4A4A7A';
    ctx.font = 'bold 8px sans-serif';
    ctx.fillText('GOAL', W/2, H-8);
  }
}

function flipPaths(paths) {
  return { T: paths.B, B: paths.T, L: paths.R, R: paths.L };
}

function renderHand() {
  const hand = G.players[G.currentPlayer].hand;
  const area = document.getElementById('hand-area');
  area.innerHTML = '';
  hand.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'hand-card' + (card.cardType === 'action' ? ' action-card' : '');
    if (G.selectedCard === card) div.classList.add('selected');
    div.onclick = () => selectCard(i);
    div.innerHTML = `
      <div class="hcard-icon">${card.icon}</div>
      <div class="hcard-info">
        <div class="hcard-name">${card.name}</div>
        <div class="hcard-desc">${card.cardType === 'action' ? card.desc : tunnelDesc(card)}</div>
      </div>`;
    area.appendChild(div);
  });

  // Buttons
  const isTunnel = G.selectedCard && G.selectedCard.cardType === 'tunnel';
  const isAction = G.selectedCard && G.selectedCard.cardType === 'action';
  document.getElementById('flip-btn').style.display = isTunnel ? 'block' : 'none';
  document.getElementById('place-btn').disabled = !(isTunnel && G.selectedCellKey && !isPlayerBroken());
  document.getElementById('action-btn').disabled = !isAction;

  // Selected info
  const info = document.getElementById('selected-info');
  if (G.selectedCard) {
    info.style.display = 'block';
    if (isTunnel) {
      info.textContent = G.selectedCellKey ? 'Click Place Tunnel to confirm' : 'Click a glowing cell on the board';
    } else {
      info.textContent = 'Click Use Action Card';
    }
  } else {
    info.style.display = 'none';
  }
}

function tunnelDesc(card) {
  const p = card.flipped ? flipPaths(card.paths) : card.paths;
  const sides = ['T','R','B','L'].filter(s => p[s]).map(s => ({T:'↑',R:'→',B:'↓',L:'←'}[s]));
  return 'Opens: ' + (sides.join(' ') || 'none');
}

function renderPlayers() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  const colors = ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E67E22'];
  G.players.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'player-item' + (i === G.currentPlayer ? ' current' : '');
    const broken = p.broken;
    const brokenStr = broken.length > 0 ? `<span class="broken-icon" title="Broken: ${broken.join(', ')}">🔴</span>` : '';
    div.innerHTML = `
      <div class="p-avatar" style="background:${colors[i]}22;color:${colors[i]}">${i+1}</div>
      <span class="p-name">${p.name}</span>
      ${brokenStr}
      <span style="font-size:0.7rem;color:#F5A623">${p.score}pt</span>`;
    list.appendChild(div);
  });
  document.getElementById('cur-player-name').textContent = G.players[G.currentPlayer].name;
}

function renderSidebar() {
  document.getElementById('round-num').textContent = G.round;
  document.getElementById('deck-count').textContent = G.deck.length;
  document.getElementById('discard-count').textContent = G.discardPile.length;

  // Goals
  const gi = document.getElementById('goals-info');
  gi.innerHTML = '';
  G.goalCards.forEach((g, i) => {
    const div = document.createElement('div');
    div.className = 'goal-pill' + (g.isGold && G.goldFound ? ' found' : g.revealed ? ' revealed' : '');
    div.textContent = `G${i+1}`;
    gi.appendChild(div);
  });
}

// ── CARD SELECTION ──
function selectCard(idx) {
  const hand = G.players[G.currentPlayer].hand;
  if (G.selectedCard === hand[idx]) {
    G.selectedCard = null;
    G.selectedCellKey = null;
    G.flipped = false;
  } else {
    G.selectedCard = hand[idx];
    G.selectedCellKey = null;
    G.flipped = false;
    if (G.selectedCard.cardType === 'tunnel') G.selectedCard.flipped = false;
  }
  renderAll();
}

function flipSelected() {
  if (!G.selectedCard || G.selectedCard.cardType !== 'tunnel') return;
  G.selectedCard.flipped = !G.selectedCard.flipped;
  renderAll();
}

// ── CELL CLICK ──
function cellClick(col, row) {
  if (!G.selectedCard) return;
  const key = `${col},${row}`;

  if (G.selectedCard.cardType === 'tunnel') {
    if (isPlayerBroken()) { toast('Your tools are broken! Fix them first.', 'error'); return; }
    const placeables = getPlaceableCells();
    const ok = placeables.some(([c,r]) => c===col && r===row);
    if (!ok) { toast('Can\'t place here!', 'error'); return; }
    G.selectedCellKey = key;
    renderAll();
  } else if (G.selectedCard.cardType === 'action') {
    if (G.selectedCard.id === 'collapse') {
      if (!G.placedCards[key] || key === `${START_COL},${START_ROW}`) {
        toast('No tunnel card there!', 'error'); return;
      }
      // Don't allow removing goal cells
      if (isGoalCell(col, row)) { toast('Can\'t remove a goal card!','error'); return; }
      G.selectedCellKey = key;
      renderAll();
    }
  }
}

function isGoalCell(col, row) {
  return col === GOAL_COL && GOAL_ROWS.includes(row);
}

// ── PLACEABLE CELLS ──
function getPlaceableCells() {
  const cells = [];
  const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
  const visited = new Set();

  // BFS from start to find all connected cells
  function connected(col, row) {
    // A cell is reachable if there's a path from start
    // Simplified: any adjacent to a placed card that connects
    return true; // checked below
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c === GOAL_COL && GOAL_ROWS.includes(r)) continue; // can't place on goal
      if (G.placedCards[`${c},${r}`]) continue; // already has card
      if (!isReachable(c, r)) continue;
      if (canPlace(c, r, G.selectedCard)) cells.push([c, r]);
    }
  }
  return cells;
}

function isReachable(col, row) {
  // Check if this empty cell is adjacent to a placed tunnel that connects to it
  const dirs = [[0,-1,'B','T'],[1,0,'L','R'],[0,1,'T','B'],[-1,0,'R','L']];
  for (const [dc, dr, fromSide, toSide] of dirs) {
    const nc = col + dc, nr = row + dr;
    const key = `${nc},${nr}`;
    if (!G.placedCards[key]) continue;
    const card = G.placedCards[key];
    const paths = card.flipped ? flipPaths(card.paths) : card.paths;
    if (paths[fromSide]) {
      // That neighbor opens toward us — check if start-connected
      if (isConnectedToStart(nc, nr)) return true;
    }
  }
  return false;
}

function isConnectedToStart(col, row) {
  const startKey = `${START_COL},${START_ROW}`;
  if (`${col},${row}` === startKey) return true;
  const visited = new Set();
  const queue = [[START_COL, START_ROW]];
  visited.add(startKey);
  const dirs = [[0,-1,'T','B'],[1,0,'R','L'],[0,1,'B','T'],[-1,0,'L','R']];
  while (queue.length) {
    const [cc, cr] = queue.shift();
    if (cc === col && cr === row) return true;
    const card = G.placedCards[`${cc},${cr}`];
    if (!card) continue;
    const paths = card.flipped ? flipPaths(card.paths) : card.paths;
    for (const [dc, dr, mySide, theirSide] of dirs) {
      const nc = cc+dc, nr = cr+dr;
      const nk = `${nc},${nr}`;
      if (visited.has(nk)) continue;
      if (!paths[mySide]) continue;
      const ncard = G.placedCards[nk];
      if (!ncard) continue;
      const npaths = ncard.flipped ? flipPaths(ncard.paths) : ncard.paths;
      if (npaths[theirSide]) { visited.add(nk); queue.push([nc, nr]); }
    }
  }
  return false;
}

function canPlace(col, row, card) {
  // Check that card paths are compatible with all neighbors
  const dirs = [[0,-1,'T','B'],[1,0,'R','L'],[0,1,'B','T'],[-1,0,'L','R']];
  const paths = card.flipped ? flipPaths(card.paths) : card.paths;
  for (const [dc, dr, mySide, theirSide] of dirs) {
    const nc = col+dc, nr = row+dr;
    const nk = `${nc},${nr}`;
    const ncard = G.placedCards[nk];
    if (!ncard) continue;
    const npaths = ncard.flipped ? flipPaths(ncard.paths) : ncard.paths;
    if (paths[mySide] !== npaths[theirSide]) return false;
  }
  return true;
}

// ── BROKEN CHECK ──
function isPlayerBroken() {
  return G.players[G.currentPlayer].broken.length > 0;
}

// ── PLACE CARD ──
function placeCard() {
  if (!G.selectedCard || !G.selectedCellKey) return;
  if (isPlayerBroken()) { toast('Tools broken!', 'error'); return; }

  const [col, row] = G.selectedCellKey.split(',').map(Number);

  // Remove from hand
  const hand = G.players[G.currentPlayer].hand;
  const idx = hand.indexOf(G.selectedCard);
  hand.splice(idx, 1);

  // Place
  G.placedCards[G.selectedCellKey] = G.selectedCard;

  log(`${G.players[G.currentPlayer].name} placed a tunnel at (${col},${row})`, 'info');

  // Check if a goal card is now reachable
  checkGoalReach(col, row);

  G.selectedCard = null;
  G.selectedCellKey = null;

  drawAndNextTurn();
}

function checkGoalReach(col, row) {
  // Check all goal positions
  GOAL_ROWS.forEach((gr, gi) => {
    const gkey = `${GOAL_COL},${gr}`;
    if (G.goldFound) return;
    // Is this goal now connected from start?
    if (isConnectedToStart(GOAL_COL, gr) && G.goalCards[gi].isGold) {
      // Gold found!
      G.goldFound = true;
      G.goalCards[gi].revealed = true;
      // Place the goal card as a passable card
      G.placedCards[gkey] = { id:'goal-gold', name:'Gold!', paths:{T:1,R:1,B:1,L:1}, flipped:false, cardType:'goal' };
      log('💎 GOLD FOUND! Miners win!', 'good');
      setTimeout(() => endGame('miners'), 800);
    } else if (col === GOAL_COL - 1 && row === gr) {
      // Adjacent to goal — reveal it
      G.goalCards[gi].revealed = true;
    }
  });
}

// ── ACTION CARD ──
function useActionCard() {
  if (!G.selectedCard || G.selectedCard.cardType !== 'action') return;
  const ac = G.selectedCard;

  if (ac.id === 'map') {
    // Peek at a goal
    showMapChoice();
  } else if (ac.id === 'collapse') {
    if (!G.selectedCellKey) { toast('First click a tunnel card on the board', 'error'); return; }
    const card = G.placedCards[G.selectedCellKey];
    if (!card) { toast('No card there', 'error'); return; }
    delete G.placedCards[G.selectedCellKey];
    G.discardPile.push(card);
    log(`${G.players[G.currentPlayer].name} caved in a tunnel!`, 'bad');
    removeFromHand();
    G.selectedCard = null;
    G.selectedCellKey = null;
    drawAndNextTurn();
  } else if (ac.id.startsWith('brk-')) {
    const tool = ac.id.split('-')[1];
    showTargetOverlay('break', tool);
  } else if (ac.id.startsWith('fix-')) {
    const tool = ac.id.split('-')[1];
    showTargetOverlay('fix', tool);
  }
}

function showMapChoice() {
  const overlay = document.getElementById('target-overlay');
  const tplayers = document.getElementById('target-players');
  document.getElementById('target-title').textContent = '👁 Peek at which goal?';
  tplayers.innerHTML = '';
  GOAL_ROWS.forEach((gr, gi) => {
    const g = G.goalCards[gi];
    const btn = document.createElement('button');
    btn.className = 'target-player-btn';
    btn.textContent = `Goal ${gi+1} ${g.revealed ? '(already known)' : ''}`;
    btn.onclick = () => {
      G.goalCards[gi].revealed = true;
      const msg = G.goalCards[gi].isGold ? '💎 That\'s the GOLD!' : '🪨 That\'s just rock.';
      log(`${G.players[G.currentPlayer].name} used Map — Goal ${gi+1}: ${G.goalCards[gi].isGold ? 'GOLD' : 'rock'}`, 'info');
      removeFromHand();
      G.selectedCard = null;
      closeTargetOverlay();
      toast(msg, G.goalCards[gi].isGold ? 'success' : '');
      drawAndNextTurn();
    };
    tplayers.appendChild(btn);
  });
  overlay.classList.add('visible');
}

function showTargetOverlay(mode, tool) {
  const overlay = document.getElementById('target-overlay');
  const tplayers = document.getElementById('target-players');
  const toolNames = { pick:'Pickaxe', lamp:'Lamp', cart:'Cart' };
  document.getElementById('target-title').textContent =
    mode === 'break' ? `Break whose ${toolNames[tool]}?` : `Fix whose ${toolNames[tool]}?`;
  tplayers.innerHTML = '';
  G.players.forEach((p, i) => {
    if (i === G.currentPlayer && mode === 'break') return;
    const hasTool = p.broken.includes(tool);
    if (mode === 'break' && hasTool) return; // already broken
    if (mode === 'fix' && !hasTool) return; // not broken
    const btn = document.createElement('button');
    btn.className = 'target-player-btn';
    btn.textContent = `${p.name} ${mode === 'fix' ? '(broken '+tool+')' : ''}`;
    btn.onclick = () => {
      if (mode === 'break') {
        p.broken.push(tool);
        log(`${G.players[G.currentPlayer].name} broke ${p.name}'s ${toolNames[tool]}!`, 'bad');
        toast(`${p.name}'s ${toolNames[tool]} is broken!`, 'error');
      } else {
        p.broken = p.broken.filter(t => t !== tool);
        log(`${G.players[G.currentPlayer].name} fixed ${p.name}'s ${toolNames[tool]}!`, 'good');
        toast(`${p.name}'s ${toolNames[tool]} is fixed!`, 'success');
      }
      removeFromHand();
      G.selectedCard = null;
      closeTargetOverlay();
      drawAndNextTurn();
    };
    tplayers.appendChild(btn);
  });
  if (!tplayers.children.length) {
    tplayers.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">No valid targets!</p>';
  }
  overlay.classList.add('visible');
}

function closeTargetOverlay() {
  document.getElementById('target-overlay').classList.remove('visible');
}

function removeFromHand() {
  const hand = G.players[G.currentPlayer].hand;
  const idx = hand.indexOf(G.selectedCard);
  if (idx !== -1) hand.splice(idx, 1);
  G.discardPile.push(G.selectedCard);
}

// ── DISCARD ──
function discardSelected() {
  if (!G.selectedCard) { toast('Select a card first', 'error'); return; }
  removeFromHand();
  log(`${G.players[G.currentPlayer].name} discarded a card`, '');
  G.selectedCard = null;
  G.selectedCellKey = null;
  drawAndNextTurn();
}

// ── DRAW & NEXT TURN ──
function drawAndNextTurn() {
  // Draw a card if available
  if (G.deck.length > 0) {
    G.players[G.currentPlayer].hand.push(G.deck.pop());
  }

  // Check if game over — deck empty and all hands empty
  const allEmpty = G.deck.length === 0 && G.players.every(p => p.hand.length === 0);
  if (allEmpty && !G.goldFound) {
    setTimeout(() => endGame('saboteurs'), 400);
    return;
  }

  // Next player
  G.currentPlayer = (G.currentPlayer + 1) % G.numPlayers;
  G.round = Math.floor(G.currentPlayer === 0 ? G.round + 1 : G.round);

  renderAll();
}

// ── END GAME ──
function endGame(winner) {
  showScreen('end-screen');
  const isMinerWin = winner === 'miners';
  document.getElementById('end-icon').textContent = isMinerWin ? '💎' : '😈';
  document.getElementById('end-title').textContent = isMinerWin ? 'Miners Win!' : 'Saboteurs Win!';
  document.getElementById('end-title').style.color = isMinerWin ? '#2ECC71' : '#E74C3C';

  // Assign scores
  const scoreList = document.getElementById('score-list');
  scoreList.innerHTML = '';
  G.players.forEach((p, i) => {
    const role = G.roles[i];
    const won = (isMinerWin && role === 'miner') || (!isMinerWin && role === 'saboteur');
    const pts = won ? (role === 'saboteur' ? 4 : 3) : 0;
    const li = document.createElement('li');
    li.innerHTML = `<span>${p.name} <span style="color:${role==='saboteur'?'#E74C3C':'#2ECC71'}">(${role})</span></span><span class="score-val">${pts} pts ${won?'🏆':''}</span>`;
    scoreList.appendChild(li);
  });
}

// ── HELPERS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function log(msg, type) {
  const area = document.getElementById('log-area');
  if (!area) return;
  const div = document.createElement('div');
  div.className = 'log-entry' + (type ? ' ' + type : '');
  div.textContent = msg;
  area.insertBefore(div, area.firstChild);
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
